<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>Activity | VibeNet</title>
    <link href="output.css" rel="stylesheet" />
  </head>
  <body>
    <nav
      class="sticky top-0 z-50 border-b border-slate-200/60 bg-white/80 backdrop-blur-xl dark:border-slate-800/60 dark:bg-slate-900/80"
    >
      <div class="mx-auto flex max-w-7xl items-center justify-between p-4">
        <a
          href="index.html"
          class="text-2xl font-black text-brand tracking-tighter italic"
          >VibeNet</a
        >
        <div class="hidden md:flex gap-6 font-bold text-sm">
          <a href="index.html" class="text-brand">Home</a>
          <a href="explore.html" class="hover:text-brand transition">Explore</a>
          <a href="messages.html" class="hover:text-brand transition"
            >Messages</a
          >
          <a href="notifications.html" class="hover:text-brand transition"
            >Activity</a
          >
        </div>
        <div class="flex items-center gap-4">
          <button
            onclick="document.documentElement.classList.toggle('dark')"
            class="h-10 w-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center cursor-pointer transition"
          >
            <span class="hover:scale-110">🌓</span>
          </button>
          <a href="profile.html">
            <button
              class="flex h-11 w-11 items-center justify-center rounded-full border-2 border-brand overflow-hidden transition-transform hover:scale-110 active:scale-95 cursor-pointer"
            >
              <img
                src="/src/assets/nichh.JPG"
                class="h-full w-full object-cover"
                alt="profile"
              />
            </button>
          </a>
        </div>
      </div>
    </nav>

    <main class="max-w-2xl mx-auto py-12 px-6">
      <div class="flex justify-between items-end mb-10">
        <div>
          <h1 class="text-4xl font-black">Activity</h1>
          <p class="text-slate-500 font-medium">Don't miss a single vibe.</p>
        </div>
        <button class="text-brand font-bold underline underline-offset-8">
          Mark all read
        </button>
      </div>

      <div
        class="bg-white dark:bg-slate-900 rounded-[32px] border border-slate-100 dark:border-slate-800 overflow-hidden divide-y dark:divide-slate-800 shadow-xl"
      >
        <div
          class="p-6 flex items-center gap-6 hover:bg-slate-50 dark:hover:bg-slate-800 transition"
        >
          <div
            class="h-14 w-14 rounded-2xl bg-rose-100 text-rose-500 flex items-center justify-center text-2xl"
          >
            ❤️
          </div>
          <div>
            <p class="font-bold"><b>Piseth</b> liked your code snippet.</p>
            <p class="text-xs text-slate-400 font-bold">2 hours ago</p>
          </div>
        </div>
        <div
          class="p-6 flex items-center gap-6 hover:bg-slate-50 dark:hover:bg-slate-800 transition"
        >
          <div
            class="h-14 w-14 rounded-2xl bg-indigo-100 text-brand flex items-center justify-center text-2xl"
          >
            👤
          </div>
          <div>
            <p class="font-bold"><b>Tech_KH</b> started following you.</p>
            <p class="text-xs text-slate-400 font-bold">Yesterday</p>
          </div>
        </div>
      </div>

      <div
        class="mt-12 bg-linear-to-r from-brand to-indigo-600 p-8 rounded-[40px] text-white shadow-2xl"
      >
        <h4 class="text-xl font-black mb-2">Build your network</h4>
        <p class="text-indigo-100 text-sm mb-6">
          Follow more creators to see more amazing work.
        </p>
        <button
          class="bg-white text-brand px-8 py-3 rounded-full font-black hover:scale-105 transition"
        >
          Discover Creators
        </button>
      </div>
    </main>
  </body>
</html>
