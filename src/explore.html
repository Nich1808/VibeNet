<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore | VibeNet - Discover Ideas</title>
    <meta
      name="description"
      content="Discover the latest trends in Cambodian art and technology."
    />
    <link href="output.css" rel="stylesheet" />
  </head>
  <body>
    <nav
      class="sticky top-0 z-50 border-b border-slate-200/60 bg-white/80 backdrop-blur-xl dark:border-slate-800/60 dark:bg-slate-900/80"
    >
      <div class="mx-auto flex max-w-7xl items-center justify-between p-4">
        <a
          href="index.html"
          class="text-2xl font-black text-brand tracking-tighter italic"
          >VibeNet</a
        >
        <div class="hidden md:flex gap-6 font-bold text-sm">
          <a href="index.html" class="text-brand">Home</a>
          <a href="explore.html" class="hover:text-brand transition">Explore</a>
          <a href="messages.html" class="hover:text-brand transition"
            >Messages</a
          >
          <a href="notifications.html" class="hover:text-brand transition"
            >Activity</a
          >
        </div>
        <div class="flex items-center gap-4">
          <button
            onclick="document.documentElement.classList.toggle('dark')"
            class="h-10 w-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center cursor-pointer transition"
          >
            <span class="hover:scale-110">🌓</span>
          </button>
          <a href="profile.html">
            <button
              class="flex h-11 w-11 items-center justify-center rounded-full border-2 border-brand overflow-hidden transition-transform hover:scale-110 active:scale-95 cursor-pointer"
            >
              <img
                src="/src/assets/nichh.JPG"
                class="h-full w-full object-cover"
                alt="profile"
              />
            </button>
          </a>
        </div>
      </div>
    </nav>

    <header
      class="bg-linear-to-br from-brand/10 to-transparent py-16 text-center"
    >
      <h1 class="text-5xl font-black tracking-tighter">Explore the Vibe</h1>
      <div class="mt-8 flex justify-center px-4">
        <input
          type="text"
          placeholder="Search #Coding #Art #KH..."
          class="w-full max-w-2xl rounded-full border border-slate-200 bg-white p-5 text-lg shadow-2xl dark:bg-slate-800 dark:border-slate-700 focus:ring-4 focus:ring-brand/20 outline-none"
        />
      </div>
    </header>

    <div class="max-w-7xl mx-auto flex gap-4 p-6 overflow-x-auto no-scrollbar">
      <span
        class="px-8 py-3 rounded-full bg-brand text-white font-black whitespace-nowrap"
        >Everything</span
      >
      <span
        class="px-8 py-3 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 font-bold whitespace-nowrap"
        >Programming</span
      >
      <span
        class="px-8 py-3 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 font-bold whitespace-nowrap"
        >Phnom Penh Life</span
      >
    </div>

    <section
      class="max-w-7xl mx-auto columns-2 md:columns-3 lg:columns-4 gap-6 p-6"
    >
      <img
        src="https://picsum.photos/400/600?1"
        class="mb-6 rounded-[32px] w-full hover:scale-105 transition duration-500"
      />
      <img
        src="https://picsum.photos/400/300?2"
        class="mb-6 rounded-[32px] w-full hover:scale-105 transition duration-500"
      />
      <img
        src="https://picsum.photos/400/500?3"
        class="mb-6 rounded-[32px] w-full hover:scale-105 transition duration-500"
      />
      <img
        src="https://picsum.photos/400/400?4"
        class="mb-6 rounded-[32px] w-full hover:scale-105 transition duration-500"
      />
    </section>
  </body>
</html>
