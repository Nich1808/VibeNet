<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>Dara Tech | VibeNet Profile</title>
    <meta
      name="description"
      content="View Dara Tech's creative portfolio and latest vibes."
    />
    <link href="output.css" rel="stylesheet" />
  </head>
  <body>
    <nav
      class="sticky top-0 z-50 border-b border-slate-200/60 bg-white/80 backdrop-blur-xl dark:border-slate-800/60 dark:bg-slate-900/80"
    >
      <div class="mx-auto flex max-w-7xl items-center justify-between p-4">
        <a
          href="index.html"
          class="text-2xl font-black text-brand tracking-tighter italic"
          >VibeNet</a
        >
        <div class="hidden md:flex gap-6 font-bold text-sm">
          <a href="index.html" class="text-brand">Home</a>
          <a href="explore.html" class="hover:text-brand transition">Explore</a>
          <a href="messages.html" class="hover:text-brand transition"
            >Messages</a
          >
          <a href="notifications.html" class="hover:text-brand transition"
            >Activity</a
          >
        </div>
        <div class="flex items-center gap-4">
          <button
            onclick="document.documentElement.classList.toggle('dark')"
            class="h-10 w-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center cursor-pointer transition"
          >
            <span class="hover:scale-110">🌓</span>
          </button>
          <a href="profile.html">
            <button
              class="flex h-11 w-11 items-center justify-center rounded-full border-2 border-brand overflow-hidden transition-transform hover:scale-110 active:scale-95 cursor-pointer"
            >
              <img
                src="/src/assets/nichh.JPG"
                class="h-full w-full object-cover"
                alt="profile"
              />
            </button>
          </a>
        </div>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
      <div
        class="h-64 rounded-[40px] bg-linear-to-tr from-brand to-indigo-900 shadow-2xl relative"
      >
        <div class="absolute -bottom-16 left-10 flex items-end gap-6">
          <img
            src="https://i.pravatar.cc/150?u=dara"
            class="h-40 w-40 rounded-[48px] border-8 border-slate-50 dark:border-slate-950 shadow-2xl"
          />
        </div>
      </div>

      <div
        class="mt-20 px-10 flex flex-col md:flex-row justify-between items-center gap-6"
      >
        <div>
          <h1 class="text-4xl font-black">Dara Tech 🇰🇭</h1>
          <p class="text-slate-500 font-medium mt-2">
            "Building the future of the Khmer web, one pixel at a time."
          </p>
        </div>
        <div class="flex gap-4">
          <button
            class="bg-brand text-white px-8 py-3 rounded-full font-black shadow-lg"
          >
            Follow
          </button>
          <button
            class="border border-slate-200 dark:border-slate-800 px-8 py-3 rounded-full font-bold"
          >
            Message
          </button>
        </div>
      </div>

      <h3 class="mt-16 mb-8 text-2xl font-black">Latest Creations</h3>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
        <img
          src="https://picsum.photos/500/500?c1"
          class="aspect-square rounded-[32px] object-cover hover:rotate-2 transition cursor-pointer shadow-lg"
        />
        <img
          src="https://picsum.photos/500/500?c2"
          class="aspect-square rounded-[32px] object-cover hover:-rotate-2 transition cursor-pointer shadow-lg"
        />
        <img
          src="https://picsum.photos/500/500?c3"
          class="aspect-square rounded-[32px] object-cover hover:rotate-2 transition cursor-pointer shadow-lg"
        />
      </div>
    </main>
  </body>
</html>
